[package]
name = "docforge-shell"
version = "0.1.0"
description = "DocForge-Core Tauri shell"
authors = ["DocForge"]
edition = "2021"

[lib]
name = "docforge_shell_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "docforge-shell"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }
